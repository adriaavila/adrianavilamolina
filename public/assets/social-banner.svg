<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Modern Startup Grid -->
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.03" />
      <circle cx="0" cy="0" r="1.5" fill="#86f7ff" fill-opacity="0.15"/>
    </pattern>
    <radialGradient id="bannerGlow" cx="50%" cy="-20%" r="100%">
      <stop offset="0%" stop-color="#1d4ed8" stop-opacity="0.4" />
      <stop offset="40%" stop-color="#1e1e2e" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#04070f" stop-opacity="1" />
    </radialGradient>
    <linearGradient id="ocean-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#86f7ff" />
      <stop offset="50%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
  </defs>
  
  <style>
    .title {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
  </style>
  
  <rect width="1200" height="630" fill="#04070f" />
  <rect width="1200" height="630" fill="url(#bannerGlow)" />
  <rect width="1200" height="630" fill="url(#grid)" />
  
  <!-- Modern App Icon container backing the logo -->
  <g transform="translate(528, 140)">
    <rect width="144" height="144" rx="36" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.12)" stroke-width="2" />
    <rect width="144" height="144" rx="36" fill="url(#ocean-gradient)" fill-opacity="0.05" />
  </g>

  <!-- Logo container, scaled to 144x144 (24 * 6) -->
  <g transform="translate(528, 140) scale(6)">
    <path d="M4 20 L12 4 L20 20 M8 12 L12 20 L16 12" stroke="url(#ocean-gradient)" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" />
  </g>
  
  <!-- Typography -->
  <text x="600" y="380" class="title" font-size="56" font-weight="800" letter-spacing="-0.04em" fill="#ffffff" text-anchor="middle">Adrian Avila</text>
  <text x="600" y="440" class="title" font-size="20" font-weight="600" letter-spacing="0.25em" fill="#86f7ff" fill-opacity="0.9" text-anchor="middle">AI AUTOMATION STUDIO</text>
  
  <!-- Button -->
  <rect x="510" y="500" width="180" height="48" rx="24" fill="url(#ocean-gradient)" fill-opacity="0.1" stroke="url(#ocean-gradient)" stroke-width="1.5" />
  <text x="600" y="529" class="title" font-size="14" font-weight="700" letter-spacing="0.05em" fill="#ffffff" text-anchor="middle">VIEW PORTFOLIO</text>
</svg>
